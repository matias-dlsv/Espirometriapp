name: "Construir y Publicar App"

on:
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ✅ Mac Intel (2019 e inferiores)
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin

          # ✅ Mac Apple Silicon (M1/M2/M3/M4)
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin

          # Windows (sin cambios)
          - platform: windows-latest
            args: ""
            rust-target: ""

          # Linux (sin cambios)
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # 👇 Esto es clave: instala el compilador para la arquitectura Mac correcta
          targets: ${{ matrix.rust-target }}

      - name: Instalar dependencias de Linux (Solo corre en Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar dependencias del Frontend
        run: npm install

      - name: Compilar Tauri y crear el Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.1
          releaseName: "EspiroSim v0.1.1"
          releaseDraft: false
          prerelease: false
          # 👇 Pasa el target correcto según la plataforma
          args: ${{ matrix.args }}
